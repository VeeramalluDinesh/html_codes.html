<!DOCTYPE html>
<html>
<head>
    <title>This page describes about comments</title>
</head>
<body>

    <!-- This is a heading -->
    <h1>Welcome to My Website</h1>

    <!-- This is a paragraph -->
    <p>This is a simple HTML page.</p>

    <!-- This is a link -->
    <a href="https://www.google.com">Go to Google</a>

    <!-- This is an image -->
    <img src="image.jpg" alt="Sample Image">

    <!-- Comment: Below is a list -->
    <ul>
        <li>Item 1</li> <!-- First item -->
        <li>Item 2</li> <!-- Second item -->
    </ul>

    <!-- This is the end of body content -->

</body>
</html>
