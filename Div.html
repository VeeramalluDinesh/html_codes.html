<!DOCTYPE html>
<html>
<head>
    <title>Div and Class Example</title>
    <style>
        .box {
            background-color: lightblue;
            width: 300px;
            padding: 20px;
            border: 2px solid blue;
            margin: 20px;
        }
        .title {
            color: darkblue;
            text-align: center;
        }
        .text {
            color: black;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 class="title">Welcome to HTML</h2>
        <p class="text">
            HTML is used to create web pages.
            The div tag is used to create sections in a webpage.
            Classes help to apply the same style to multiple elements.
        </p>
    </div>
</body>
</html>
