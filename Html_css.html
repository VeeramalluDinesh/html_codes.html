<!DOCTYPE html>
<html>
<head>
    <title>Simple CSS Example</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial;
            text-align: center;
        }
        h1 {
            color: darkblue;
        }
        p {
            color: green;
            font-size: 20px;
        }
        button {
            background-color: orange;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Welcome to CSS</h1>
    <p>This is a simple HTML page using CSS.</p>
</body>
</html>
