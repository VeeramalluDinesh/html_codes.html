<!DOCTYPE html>
<html>
<head>
    <title>List</title>
</head>
<body>
    <h2>Ordered List</h2>
    <ol>
        <li>Java</li>
        <li>Python</li>
        <li>HTML</li>
    </ol>
    <h2>Unordered List</h2>
    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
    </ul>
    <h2>Blockquote Example</h2>
    <blockquote>
        "Learning HTML is easy and interesting."
    </blockquote>
</body>
</html>
