<!DOCTYPE html>
<html>
<head>
    <title>HTML Quotations Example</title>
</head>
<body>

    <h2>Short Quote using q tag</h2>
    <p>My teacher said, <q>Practice makes perfect</q>.</p>

    <h2>Long Quote using blockquote</h2>
    <blockquote>
        Success is not final, failure is not fatal:
        it is the courage to continue that counts.
    </blockquote>

    <h2>Using cite tag</h2>
    <p>This quote is from <cite>Winston Churchill</cite>.</p>

    <h2>Using abbr tag</h2>
    <p><abbr title="HyperText Markup Language">HTML</abbr> is used to create web pages.</p>

</body>
</html>
